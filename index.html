<html lang="es">

<style>
  :root{
    --paper: #EDEFEA; --paper-raised: #F6F7F3; --ink: #1C2321; --ink-soft: #4B534E;
    --muted: #767A72; --line: #D3D6CC; --accent: #2F6F5E; --accent-soft: #DCE8E2;
    --alert: #B0472A; --alert-soft: #F3DFD7; --radius: 3px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1320px;margin:0 auto;padding:32px 20px 80px;}
  header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:32px;margin:0;letter-spacing:-0.01em;}
  h1 .accent-dot{color:var(--accent);}
  .subtitle{color:var(--muted);font-size:13px;margin-top:2px;}
  .tabbar{display:flex;background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .tabbar button{font-family:'Inter';font-size:13px;font-weight:500;color:var(--ink-soft);background:none;border:none;padding:9px 16px;cursor:pointer;border-right:1px solid var(--line);}
  .tabbar button:last-child{border-right:none;}
  .tabbar button.active{background:var(--ink);color:var(--paper);}
  .month-strip{display:flex;overflow-x:auto;gap:2px;margin-bottom:24px;padding-bottom:4px;}
  .month-tab{flex:0 0 auto;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;padding:8px 14px 10px;background:var(--paper-raised);border:1px solid var(--line);border-bottom:none;border-radius:4px 4px 0 0;color:var(--muted);cursor:pointer;position:relative;white-space:nowrap;}
  .month-tab::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--line);}
  .month-tab.active{background:var(--paper);color:var(--ink);font-weight:600;border-color:var(--ink);}
  .month-tab.active::after{background:var(--paper);}
  .card{background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
  .card-title{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:0 0 14px;}
  .summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:16px;}
  .stat .num{font-family:'Fraunces',serif;font-size:28px;font-weight:600;}
  .stat .num.spend{color:var(--alert);}
  .stat .label{font-size:12px;color:var(--muted);margin-top:2px;}
  .cat-line{display:flex;align-items:baseline;gap:8px;padding:7px 0;border-bottom:1px dotted var(--line);}
  .cat-line:last-child{border-bottom:none;}
  .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .cat-name{font-size:13px;flex-shrink:0;}
  .cat-leader{flex:1;border-bottom:1px dotted var(--line);position:relative;top:-4px;}
  .cat-amt{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;white-space:nowrap;}
  .cat-bar-bg{height:4px;background:var(--line);border-radius:2px;margin-top:4px;overflow:hidden;}
  .catbar-row{display:flex;align-items:center;gap:12px;padding:7px 6px;cursor:pointer;border-radius:3px;}
  .catbar-row:hover{background:var(--accent-soft);}
  .catbar-row.selected{background:var(--accent-soft);}
  .catbar-name{width:150px;flex-shrink:0;font-size:13px;display:flex;align-items:center;gap:8px;}
  .catbar-row.selected .catbar-name{font-weight:600;}
  .catbar-track{flex:1;height:20px;background:var(--paper);border-radius:3px;overflow:hidden;}
  .catbar-fill{height:100%;border-radius:3px;}
  .catbar-amt{font-family:'IBM Plex Mono',monospace;font-size:12px;min-width:90px;text-align:right;flex-shrink:0;}
  .cat-bar-fill{height:100%;border-radius:2px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:500;padding:0 10px 8px;border-bottom:1px solid var(--ink);}

  tr:hover td{background:var(--accent-soft);}

  .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .chip{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 10px;border-radius:14px;background:var(--paper);border:1px solid var(--line);}
  .chip button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:0;line-height:1;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:4px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  .flex-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .small-muted{font-size:12px;color:var(--muted);}
  .login-screen{max-width:360px;margin:120px auto;text-align:center;}
  .login-screen h1{margin-bottom:6px;}
  .login-screen p{color:var(--muted);font-size:13px;margin-bottom:20px;}
  .login-screen input{margin-bottom:10px;}

  ::selection{background:var(--accent-soft);}
  .dropzone{
    border:1.5px dashed var(--line);border-radius:var(--radius);padding:24px;text-align:center;

  .dropzone .dz-label{font-size:13px;color:var(--ink-soft);}
  .dropzone .dz-sub{font-size:11px;color:var(--muted);margin-top:4px;}
  .preview-table td, .preview-table th{padding:6px 8px;}
  .preview-table input, .preview-table select{font-size:12px;padding:5px 6px;}
  .preview-table .excl{opacity:.4;}
  .preview-table .no-cat td{background:var(--alert-soft);}
  .bank-badge{
    display:inline-block;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
    padding:2px 8px;border-radius:10px;background:var(--accent-soft);color:var(--accent);margin-left:8px;
  }
  .spinner{
    width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;
    display:inline-block;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>

  {nombre:'Suscripciones', color:'#8A5FBF', keywords:['netflix','spotify','apple.com','amazon prime','disney','icloud','openai','anthropic']},

  cards: [],           // {id, nombre}
  categories: [],       // {id, nombre, color, keywords}

  pendingNewCards: [],  // cards suggested from a PDF, not yet saved to the DB
  customFrom: '',       // rango personalizado en Análisis

if(window.pdfjsLib){
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

/* ---------- Auth ---------- */
async function initAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if(session){ await onLogin(session.user); }
  else { document.getElementById('loginScreen').style.display = ''; }

  sb.auth.onAuthStateChange((event, session) => {
    if(event === 'SIGNED_IN' && session){ onLogin(session.user); }
    if(event === 'SIGNED_OUT'){ location.reload(); }
  });
}
document.getElementById('loginBtn').addEventListener('click', async ()=>{
  const email = document.getElementById('loginEmail').value.trim();
  if(!email){ return; }
  document.getElementById('loginStatus').textContent = 'Enviando...';
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: window.location.origin } });
  document.getElementById('loginStatus').textContent = error ? 'Error: '+error.message : 'Revisa tu correo y da clic en el link.';
});
document.getElementById('logoutBtn').addEventListener('click', async ()=>{ await sb.auth.signOut(); });

async function onLogin(user){
  state.user = user;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = '';
  await ensureDefaults();
  await loadAll();
  renderAll();
}

/* ---------- Seed defaults on first login ---------- */
async function ensureDefaults(){
  const { data: cards } = await sb.from('tarjetas').select('id').limit(1);
  if(!cards || cards.length === 0){
    await sb.from('tarjetas').insert(DEFAULT_CARDS.map(nombre=>({nombre})));
  }
  const { data: cats } = await sb.from('categorias').select('id').limit(1);
  if(!cats || cats.length === 0){
    await sb.from('categorias').insert(DEFAULT_CATEGORIES);
  }
}

/* ---------- Data loading ---------- */
async function loadAll(){
  const [{data:cards}, {data:cats}, {data:tx}] = await Promise.all([
    sb.from('tarjetas').select('*').order('nombre'),
    sb.from('categorias').select('*').order('nombre'),
    sb.from('movimientos').select('*').order('fecha', {ascending:false}),
  ]);
  state.cards = cards || [];
  state.categories = cats || [];
  state.transactions = (tx || []).map(t => {
    const cat = t.categoria_id ? state.categories.find(c=>c.id===t.categoria_id) : null;
    return {
      ...t,
      cardName: (state.cards.find(c=>c.id===t.tarjeta_id)||{}).nombre || '—',
      catName: cat ? (cat.nombre || 'Otro') : null,
      catTipo: cat ? (cat.tipo || 'gasto') : null,
    };
  });
}

/* ---------- Utils ---------- */
function uid(){ return Math.random().toString(36).slice(2,10); }
function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
    reader.readAsDataURL(file);
  });
}
// Convierte cada página del PDF en una imagen JPEG comprimida (usando <canvas>,
// disponible en el navegador). Esto evita mandar el PDF completo — que en
// estados de cuenta escaneados de varias páginas puede pesar varios MB y
// rebasar el límite de tamaño de request de las funciones serverless de
// Vercel (4.5MB) — por imágenes mucho más ligeras que sí caben.
async function pdfToImages(file, maxDimension=1500, quality=0.72, maxPages=25){
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const numPages = Math.min(pdf.numPages, maxPages);
  const images = [];
  for(let i=1; i<=numPages; i++){
    const page = await pdf.getPage(i);
    const viewport1 = page.getViewport({ scale: 1 });
    const scale = Math.min(2, maxDimension / Math.max(viewport1.width, viewport1.height));
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = Math.ceil(viewport.width);
    canvas.height = Math.ceil(viewport.height);
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    const dataUrl = canvas.toDataURL('image/jpeg', quality);
    images.push(dataUrl.split(',')[1]);
    canvas.width = 0; canvas.height = 0; // libera memoria
  }
  return images;
}
function fmtMoney(n){
  const neg = n < 0;
  const v = Math.abs(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
  return (neg? '-':'') + '$' + v;
}
function monthKey(dateStr){ return dateStr.slice(0,7); }
function monthLabel(key){
  const [y,m] = key.split('-');
  const names = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return names[parseInt(m,10)-1] + ' ' + y;
}
function guessCategoryId(desc){
  const d = desc.toLowerCase();
  for(const cat of state.categories){
    for(const kw of (cat.keywords||[])){
      if(kw && d.includes(kw.toLowerCase())) return cat.id;
    }
  }
  const otro = state.categories.find(c=>c.nombre==='Otro');
  return otro ? otro.id : (state.categories[0] && state.categories[0].id);
}
// Extrae un "nombre de comercio" limpio de una descripción de movimiento,
// quitando códigos de referencia (tokens con dígitos) para usarlo como keyword.
function merchantKey(desc){
  if(!desc) return null;
  const words = desc.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // quita acentos
    .split(/\s+/)
    .map(w => w.replace(/[^a-z]/g, '')) // quita paréntesis, slashes, dígitos pegados, etc.
    .filter(w => w && w.length >= 3);
  if(words.length === 0) return null;
  const key = words.slice(0, 3).join(' ').trim();
  return key.length >= 3 ? key : null;
}
// Aprende: la próxima vez que aparezca este comercio, se sugiere esta categoría solo.
// Además, corrige AHORA todos los movimientos ya guardados de ese mismo comercio que
// sigan en "Otro" o sin categoría — así no hay que repetir la corrección mes a mes.
// Se llama cada vez que se confirma/edita una categoría (import o edición manual).
async function learnCategory(categoriaId, descripcion){
  if(!categoriaId) return;
  const key = merchantKey(descripcion);
  if(!key){ console.warn('learnCategory: no se pudo generar keyword para', descripcion); return; }
  const target = state.categories.find(c=>c.id===categoriaId);
  if(!target){ console.warn('learnCategory: categoría no encontrada', categoriaId); return; }
  const already = (target.keywords||[]).some(k=>k.toLowerCase()===key);
  // Quita el keyword de cualquier OTRA categoría para no generar ambigüedad.
  for(const cat of state.categories){
    if(cat.id === categoriaId) continue;
    if(!(cat.keywords||[]).some(k=>k.toLowerCase()===key)) continue;
    const newKw = cat.keywords.filter(k=>k.toLowerCase()!==key);
    const { error } = await sb.from('categorias').update({ keywords: newKw }).eq('id', cat.id);
    if(error){ console.error('learnCategory: error quitando keyword de otra categoría', error); showToast('No se pudo actualizar keywords: '+error.message); }
    else cat.keywords = newKw;
  }
  if(!already){
    const newKw = [...(target.keywords||[]), key];
    const { error } = await sb.from('categorias').update({ keywords: newKw }).eq('id', categoriaId);
    if(error){ console.error('learnCategory: error guardando keyword nuevo', error); showToast('No se pudo aprender la categoría: '+error.message); }
    else{ target.keywords = newKw; console.log('learnCategory: aprendido', key, '→', target.nombre); }
  }
  const retroCount = await retroCategorize(categoriaId, key);
  return retroCount;
}
// Recategoriza AHORA todos los movimientos ya guardados que coincidan con el mismo
// comercio (mismo keyword) y que sigan en "Otro" o sin categoría — nunca toca uno que
// el usuario ya haya categorizado distinto a propósito. Devuelve cuántos se corrigieron.
async function retroCategorize(categoriaId, key){
  const otroCat = state.categories.find(c=>c.nombre==='Otro');
  let query = sb.from('movimientos').update({ categoria_id: categoriaId }).ilike('descripcion', `%${key}%`).neq('categoria_id', categoriaId);
  query = otroCat ? query.or(`categoria_id.eq.${otroCat.id},categoria_id.is.null`) : query.is('categoria_id', null);
  const { data, error } = await query.select('id');
  if(error){ console.error('retroCategorize error', error); return 0; }
  return (data||[]).length;
}
function catColor(name){
  const c = state.categories.find(c=>c.nombre===name);
  return c ? c.color : '#767A72';
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer = setTimeout(()=>t.classList.remove('show'), 2200);
}
function allMonths(){
  const set = new Set(state.transactions.map(t=>monthKey(t.fecha)));
  const arr = [...set].sort().reverse();
  return arr.length ? arr : [new Date().toISOString().slice(0,7)];
}

/* ============================================================
   Parsers de estados de cuenta en PDF, por banco.
   Cada parser: detect(text) -> bool, parse(text) -> [{fecha, descripcion, monto, cardholder}]
   Para agregar un banco nuevo: sube un PDF de ejemplo a Claude en el chat
   y pide que le agregue el parser aquí.
   ============================================================ */
const MESES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

async function extractPdfText(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;
  let full = '';
  let amountColX = null; // posición X de la columna "Importe" — se detecta una vez y se reusa en páginas siguientes que no repiten el encabezado
  for(let i=1; i<=pdf.numPages; i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    // Agrupar por posición Y (fila visual), no por orden de extracción crudo del PDF.
    // Los PDFs de estados de cuenta suelen tener fecha/descripción y monto como
    // columnas separadas — si confiamos en el orden de stream, se desalinean.
    const items = content.items
      .filter(it => it.str && it.str.trim())
      .map(it => ({ str: it.str, x: it.transform[4], y: it.transform[5] }));
    const importeHeader = items.find(it => /Importe/i.test(it.str));
    if(importeHeader) amountColX = importeHeader.x;
    const lines = [];
    const yTolerance = 2.5;
    items.forEach(it => {
      let line = lines.find(l => Math.abs(l.y - it.y) < yTolerance);
      if(!line){ line = { y: it.y, items: [] }; lines.push(line); }
      line.items.push(it);
    });
    lines.sort((a,b) => b.y - a.y); // de arriba hacia abajo
    lines.forEach(line => {
      line.items.sort((a,b) => a.x - b.x); // de izquierda a derecha
      const lastItem = line.items[line.items.length - 1];
      // Si el último elemento de la fila (el más a la derecha) es un monto "puro"
      // (nada más que el número, sin texto pegado) Y además cae dentro de la
      // columna real de "Importe" (no solo el último texto de una fila corta que
      // no llega hasta esa columna, como "Dólar U.S.A. 250.06" sin nada más al
      // lado), lo marcamos con un caracter invisible. Así los parsers distinguen
      // el monto real de cualquier otro número suelto en la descripción.
      const isPureAmount = lastItem && /^[\d,]+\.\d{2}$/.test(lastItem.str.trim());
      const inAmountColumn = amountColX === null || (lastItem && lastItem.x >= amountColX - 30);
      full += line.items.map(it=>it.str).join(' ') + (isPureAmount && inAmountColumn ? '\u200B' : '') + '\n';
    });
    full += '\n';
  }
  return full;
}

function parseAmexText(rawText){
  // Año del corte, para resolver el año de cada movimiento
  const corteMatch = rawText.match(/(\d{2})-([A-Za-zé]{3,4})-(\d{4})/);
  let corteYear = new Date().getFullYear();
  let corteMonthIdx = new Date().getMonth();
  const MESES_ABBR = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
  if(corteMatch){
    corteYear = parseInt(corteMatch[3], 10);
    const abbr = corteMatch[2].toLowerCase().slice(0,3);
    if(MESES_ABBR[abbr] !== undefined) corteMonthIdx = MESES_ABBR[abbr];
  }

  // Ventana de parseo: solo las páginas de "Fecha y Detalle de las operaciones",
  // cortando antes de las secciones de Planes de Pagos Diferidos / Puntos / CFDI
  // (esas tienen fechas y montos que NO son transacciones nuevas).
  const startIdx = rawText.search(/Fecha y Detalle de las operaciones/i);
  const searchFrom = startIdx === -1 ? 0 : startIdx;
  const endMarkers = [
    /Resumen de Planes de Pagos Diferidos con Intereses/i,
    /Resumen de Meses sin Intereses/i,
    /Conoce más de Planea tu Pago/i,
    /Puntos Aeroméxico Rewards/i,
    /Comprobante Fiscal Digital/i,
    /Membership\s*Rewards/i,
    /Información al Tarjetahabiente/i,
  ];
  let endIdx = rawText.length;
  endMarkers.forEach(re=>{
    // Buscar SOLO después del inicio de la tabla — la página 1 menciona
    // "Resumen de Planes de Pagos Diferidos" como subtítulo informativo,
    // antes de que empiece la tabla real, lo cual cortaba la ventana vacía.
    const m = rawText.slice(searchFrom).search(re);
    if(m !== -1 && (searchFrom + m) < endIdx) endIdx = searchFrom + m;
  });
  let windowText = rawText.slice(searchFrom, endIdx);

  // El agrupado por fila (extractPdfText) a veces parte "19 de\nDiciembre" en dos
  // filas visuales distintas cuando el día tiene 2 dígitos y el mes es largo (no
  // caben en el ancho angosto de esa columna). Eso deja "19 de" pegado a la
  // descripción/monto de esa fila, y "Diciembre" solo al inicio de la siguiente,
  // por lo que el regex de fecha nunca hace match y la transacción se pierde por
  // completo. Aquí se re-junta antes de buscar transacciones.
  const MESES_NOMBRE = 'Enero|Febrero|Marzo|Abril|Mayo|Junio|Julio|Agosto|Septiembre|Octubre|Noviembre|Diciembre';
  const mesRe = new RegExp('^(' + MESES_NOMBRE + ')\\b(.*)$', 'i');
  const wLines = windowText.split('\n');
  for(let li=0; li<wLines.length-1; li++){
    const dm = wLines[li].match(/^(\d{1,2}\s+de)\s+(.*)$/i);
    if(!dm) continue;
    if(mesRe.test(dm[2].trim())) continue; // ya trae el mes en la misma línea
    const nm = wLines[li+1].match(mesRe);
    if(!nm) continue;
    wLines[li] = `${dm[1]} ${nm[1]} ${dm[2]}`.trim();
    wLines[li+1] = nm[2].trim();
  }
  windowText = wLines.join('\n');

  // Quitar líneas de subtotal que no son transacciones individuales
  windowText = windowText
    .replace(/Total de las transacciones en \$ de[\s\S]*?[\d,]+\.\d{2}/gi, ' ')
    .replace(/Total de Cargos en Moneda Extranjera de[\s\S]*?[\d,]+\.\d{2}/gi, ' ')
    .replace(/Total de Transacciones en Moneda Extranjera de[\s\S]*?[\d,]+\.\d{2}/gi, ' ')
    .replace(/Total de Cargos para[^\n]*?(?=\d{1,2}\s+de\s+[A-Za-zé]+)/gi, ' ')
    .replace(/Total de Meses sin Intereses[\s\S]{0,200}?[\d,]+\.\d{2}/gi, ' ')
    .replace(/Total de las transacciones y comisiones[\s\S]{0,20}?[\d,]+\.\d{2}/gi, ' ')
    .replace(/Total de IVA sobre transacciones y comisiones[\s\S]{0,20}?[\d,]+\.\d{2}/gi, ' ');

  // Detectar bloques por tarjetahabiente ("Nuevos cargos y abonos de X")
  // Se compara por número de cuenta (más confiable que el nombre, que a veces
  // no queda bien delimitado en el texto extraído del PDF).
  const holderSplit = windowText.split(/Nuevos cargos y abonos de\s+/i);
  const acctMatches = [...rawText.matchAll(/Número de Cuenta\s*([\d-]{8,20})/gi)];
  const primaryAccount = acctMatches.length ? acctMatches[0][1] : null;

  const results = [];
  const dateAnchor = /(\d{1,2})\s+de\s+([A-Za-zé]{3,12})\b/gi;

  holderSplit.forEach((block, blockIdx) => {
    let holderName = null;
    let holderAccount = null;
    let text = block;
    if(blockIdx > 0){
      const nameMatch = block.match(/^([A-ZÁÉÍÓÚÑ ]{6,60})\s*Número de Cuenta/i);
      holderName = nameMatch ? nameMatch[1].trim() : null;
      const acctMatch = block.match(/Número de Cuenta\s*([\d-]{8,20})/i);
      holderAccount = acctMatch ? acctMatch[1] : null;
    }
    const isSecondary = holderAccount && primaryAccount && holderAccount !== primaryAccount;

    const matches = [...text.matchAll(dateAnchor)];
    for(let i=0; i<matches.length; i++){
      const m = matches[i];
      const segStart = m.index + m[0].length;
      const segEnd = i+1 < matches.length ? matches[i+1].index : Math.min(text.length, segStart + 400);
      let segment = text.slice(segStart, segEnd);

      if(/PAGO RECIBIDO/i.test(segment)) continue; // pago, no gasto
      // Quitar el sub-monto en moneda extranjera (Dólar, Corona Sueca, Euro, etc.)
      // — su posición respecto al monto en MXN varía entre estados de cuenta,
      // así que se descarta antes de decidir cuál número es el monto real.
      const segmentForAmount = segment.replace(/(Dólar U\.S\.A\.?|Corona Sueca|Euro|Libra Esterlina)\.?\s*[\d,]+[.,]\d{2}(\s*TC:?\s*[\d,]+\.\d+)?/gi, ' ');
      const amounts = [...segmentForAmount.matchAll(/[\d,]+\.\d{2}\u200B?/g)];
      if(amounts.length === 0) continue;
      // Preferir montos marcados con \u200B (eran el elemento más a la derecha de
      // su fila visual en el PDF = la columna real de "Importe en MN"). Si por lo
      // que sea ninguno quedó marcado, cae al comportamiento anterior (el último
      // número del segmento) como red de seguridad.
      const markedAmounts = amounts.filter(a => a[0].includes('\u200B'));
      const candidates = markedAmounts.length ? markedAmounts : amounts;
      const last = candidates[candidates.length-1];
      const afterLast = segmentForAmount.slice(last.index + last[0].length, last.index + last[0].length + 6);
      // "CR" debe aparecer como marcador aislado justo después del monto, no como
      // substring de un RFC (ej. "RFCRDI841003QJ4" contiene "CR" por coincidencia).
      // Un CR puede ser un pago que le hiciste a la tarjeta (se excluye) o un cargo
      // que el comercio te regresó/reembolsó (sí se importa, en negativo, para que
      // se reste del gasto original en vez de desaparecer sin dejar rastro).
      const isCredit = /^\s*CR\b/.test(afterLast);

      const montoAbs = parseFloat(last[0].replace(/,/g,'').replace(/\u200B/g,''));
      if(isNaN(montoAbs) || montoAbs <= 0) continue;

      const cargoMatch = segment.match(/CARGO\s+(\d+)\s+DE\s+(\d+)/i);
      const cuotaActual = cargoMatch ? parseInt(cargoMatch[1], 10) : null;
      const cuotaTotal = cargoMatch ? parseInt(cargoMatch[2], 10) : null;

      let desc = segment.slice(0, last.index)
        .replace(/\u200B/g, '')
        .replace(/RFC\S+/gi, ' ')
        .replace(/\/?REF\S+/gi, ' ')
        .replace(/Dólar U\.S\.A\.?\s*[\d,]+\.\d{2}(\s*TC:?\s*[\d,]+\.\d+)?/gi, ' ')
        .replace(/CARGO\s+\d+\s+DE\s+\d+/gi, ' ')
        .replace(/\s{2,}/g, ' ')
        .trim()
        .slice(0, 80);
      if(!desc) desc = 'Movimiento sin descripción';

      if(isCredit && /PAGO RECIBIDO|GRACIAS POR SU PAGO|PAGO POR TRANSFERENCIA|PAGO EN LINEA|TRANSFEREN|DEPOSITO|DIFERIR/i.test(desc)) continue; // pago a la tarjeta, o conversion a MSI (no es un gasto ni un reembolso real)
      const monto = isCredit ? -montoAbs : montoAbs;

      const dia = parseInt(m[1], 10);
      const mesTxt = m[2].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').slice(0,3);
      const mesIdx = MESES_ABBR[mesTxt];
      if(mesIdx === undefined) continue;
      let year = corteYear;
      const prevMonthIdx = (corteMonthIdx - 1 + 12) % 12;
      if(mesIdx === prevMonthIdx && corteMonthIdx === 0) year = corteYear - 1;

      const fecha = `${year}-${String(mesIdx+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
      results.push({
        fecha, descripcion: desc + (isCredit ? ' (reembolso/cargo regresado)' : '') + (isSecondary && holderName ? ` (${holderName.split(' ')[0]})` : ''),
        monto, cuotaActual, cuotaTotal,
      });
    }
  });

  // de-dup exacto (misma fecha+desc+monto) por si el split de holders duplicó algo
  const seen = new Set();
  return results.filter(r=>{
    const key = r.fecha+'|'+r.descripcion+'|'+r.monto;
    if(seen.has(key)) return false;
    seen.add(key); return true;
  });
}

function detectAmexCardName(rawText){
  // Se distingue por número de cuenta, no por nivel de tarjeta (Gold/Platinum
  // pueden ser la misma cuenta con cambio de categoría).
  // ":?" tolera tanto "Número de Cuenta 3766-..." como "Número de Cuenta: 3766-..."
  // — el documento repite este dato en varias secciones y no siempre usa el
  // mismo formato; si el regex no toleraba los dos puntos, a veces fallaba en
  // encontrar el número y creaba una tarjeta genérica "Amex" nueva cada vez.
  const acctMatch = rawText.match(/Número de Cuenta:?\s*([\d-]{8,20})/i);
  const digitsOnly = acctMatch ? acctMatch[1].replace(/\D/g,'') : null;
  const last4 = digitsOnly ? digitsOnly.slice(-4) : null;
  const last5 = digitsOnly ? digitsOnly.slice(-5) : null;
  // Cuentas ya identificadas por el usuario — nombre fijo en vez del genérico
  // "Amex …XXXX", para que el import encuentre siempre la misma tarjeta ya
  // existente en vez de crear una nueva cada vez.
  const KNOWN_AMEX_ACCOUNTS = {
    '22005': 'Amex Credito',
    '33000': 'Amex Platino',
  };
  if(last5 && KNOWN_AMEX_ACCOUNTS[last5]) return KNOWN_AMEX_ACCOUNTS[last5];
  return last4 ? `Amex …${last4}` : 'Amex';
}

function detectSantanderCard(rawText){
  const m = rawText.match(/Unique Rewards (\w+) Visa/i);
  if(m) return `Santander ${m[1].charAt(0).toUpperCase()+m[1].slice(1).toLowerCase()}`;
  const acct = rawText.match(/N[uú]mero de tarjeta:\s*([\d ]{10,25})/i);
  const last4 = acct ? acct[1].replace(/\D/g,'').slice(-4) : null;
  return last4 ? `Santander …${last4}` : 'Santander';
}

function parseSantanderCreditText(rawText){
  const endIdx = rawText.search(/ATENCIÓN DE QUEJAS/i);
  let windowText = endIdx === -1 ? rawText : rawText.slice(0, endIdx);

  // Quitar líneas de subtotal (traen signo, contaminan el último renglón de cada bloque)
  windowText = windowText
    .replace(/Total de cargos[\s\S]{0,20}?[+-]\s*\$[\d,]+\.\d{2}/gi, ' ')
    .replace(/Total de abonos[\s\S]{0,20}?[+-]\s*\$[\d,]+\.\d{2}/gi, ' ');

  // Ancla: DOS fechas DD-Mon-YYYY seguidas (fecha operación + fecha cargo) —
  // excluye naturalmente la tabla de "diferidos a meses" (una sola fecha por renglón).
  const rowAnchor = /(\d{2})-([A-Za-zé]{3})-(\d{4})\s+\d{2}-[A-Za-zé]{3}-\d{4}\s+/gi;
  const matches = [...windowText.matchAll(rowAnchor)];
  const MESES_ABBR = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};

  // Encabezados "Tarjeta titular/adicional" en orden, para etiquetar cada movimiento
  const headings = [...windowText.matchAll(/Tarjeta (titular|adicional)/gi)]
    .map(m => ({ idx: m.index, tipo: m[1].toLowerCase() }));

  const results = [];
  for(let i=0; i<matches.length; i++){
    const m = matches[i];
    const segStart = m.index + m[0].length;
    const segEnd = i+1 < matches.length ? matches[i+1].index : Math.min(windowText.length, segStart+200);
    const segment = windowText.slice(segStart, segEnd);

    const signed = [...segment.matchAll(/([+-])\s*\$\s*([\d,]+\.\d{2})/g)];
    if(signed.length === 0) continue;
    const last = signed[signed.length-1];
    // Un signo "-" puede ser un pago que le hiciste a la tarjeta (se excluye) o un
    // cargo que el comercio te regresó/reembolsó (sí se importa, en negativo).
    const isCredit = last[1] === '-';

    const montoAbs = parseFloat(last[2].replace(/,/g,''));
    if(isNaN(montoAbs) || montoAbs <= 0) continue;

    let desc = segment.slice(0, last.index)
      .replace(/[A-Z]{2,4}\d[\dA-Z]{5,12}/g, ' ')
      .replace(/\d+\.\d{2}\s*USD\s*TC\s*[\d.]+/gi, ' ')
      .replace(/\s{2,}/g, ' ')
      .trim()
      .slice(0, 80);
    if(!desc) desc = 'Movimiento sin descripción';

    if(isCredit && /PAGO RECIBIDO|GRACIAS POR SU PAGO|PAGO POR TRANSFERENCIA|PAGO EN LINEA|TRANSFEREN|DEPOSITO|DIFERIR/i.test(desc)) continue; // pago a la tarjeta, o conversion a MSI (no es un gasto ni un reembolso real)
    const monto = isCredit ? -montoAbs : montoAbs;

    let tipo = 'titular';
    for(const h of headings){ if(h.idx < m.index) tipo = h.tipo; else break; }

    const dia = parseInt(m[1], 10);
    const mesTxt = m[2].toLowerCase().slice(0,3);
    const mesIdx = MESES_ABBR[mesTxt];
    const year = parseInt(m[3], 10);
    if(mesIdx === undefined) continue;
    const fecha = `${year}-${String(mesIdx+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;

    results.push({ fecha, descripcion: desc + (isCredit ? ' (reembolso/cargo regresado)' : '') + (tipo === 'adicional' ? ' (adicional)' : ''), monto });
  }
  return results;
}

function parseSantanderChecking(rawText){
  const MESES_ABBR = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
  const blockStarts = [...rawText.matchAll(/SALDO FINAL DEL PER[IÍ]ODO ANTERIOR:?\s*\$?\s*([\d,]+\.\d{2})/gi)];
  const results = [];

  for(let b=0; b<blockStarts.length; b++){
    const startMatch = blockStarts[b];
    const blockTextStart = startMatch.index + startMatch[0].length;
    const blockTextEnd = b+1 < blockStarts.length ? blockStarts[b+1].index : rawText.length;
    let blockText = rawText.slice(blockTextStart, blockTextEnd);
    const totalIdx = blockText.search(/\bTOTAL\b/);
    if(totalIdx !== -1) blockText = blockText.slice(0, totalIdx);

    let prevSaldo = parseFloat(startMatch[1].replace(/,/g,''));
    const rowAnchor = /(\d{2})-([A-Za-zé]{3})-(\d{4})\s+\d{3,10}\s+/gi;
    const matches = [...blockText.matchAll(rowAnchor)];

    for(let i=0; i<matches.length; i++){
      const m = matches[i];
      const segStart = m.index + m[0].length;
      const segEnd = i+1 < matches.length ? matches[i+1].index : blockText.length;
      const segment = blockText.slice(segStart, segEnd);

      const nums = [...segment.matchAll(/[\d,]+\.\d{2}/g)];
      if(nums.length === 0) continue;
      const saldo = parseFloat(nums[nums.length-1][0].replace(/,/g,''));
      if(isNaN(saldo)) continue;

      const delta = saldo - prevSaldo;
      prevSaldo = saldo; // avanza aunque no sea retiro, para no romper la cadena

      if(delta >= -0.005) continue; // depósito o sin cambio — no es gasto
      const monto = Math.round((-delta) * 100) / 100;

      let desc = segment.slice(0, nums[nums.length-1].index)
        .replace(/CLAVE DE RASTREO\s+\S+/gi, ' ')
        .replace(/\bREF\s+\S+/gi, ' ')
        .replace(/\bRFC\s+\S+/gi, ' ')
        .replace(/DE LA CUENTA\s+\d+/gi, ' ')
        .replace(/\(1\)\s*DATO NO VERIFICADO POR ESTA INSTITUCION/gi, ' ')
        .replace(/CONCEPTO\s+\S+/gi, ' ')
        .replace(/[\d,]+\.\d{2}/g, ' ')
        .replace(/\s{2,}/g, ' ')
        .trim()
        .slice(0, 110);
      if(!desc) desc = 'Movimiento sin descripción';

      const dia = parseInt(m[1], 10);
      const mesTxt = m[2].toLowerCase().slice(0,3);
      const mesIdx = MESES_ABBR[mesTxt];
      const year = parseInt(m[3], 10);
      if(mesIdx === undefined) continue;
      const fecha = `${year}-${String(mesIdx+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;

      results.push({ fecha, descripcion: desc, monto });
    }
  }
  return results;
}

const BANK_PARSERS = [
  { name: 'American Express', detect: t => /AMERICAN\s*EXPRESS/i.test(t), parse: parseAmexText, detectCard: detectAmexCardName },
  { name: 'Santander (tarjeta de crédito)', detect: t => /Santander/i.test(t) && /N[uú]mero de tarjeta/i.test(t), parse: parseSantanderCreditText, detectCard: detectSantanderCard },
  { name: 'Santander (cuenta de débito)', detect: t => /Santander/i.test(t) && /SALDO FINAL DEL PER[IÍ]ODO ANTERIOR/i.test(t) && !/N[uú]mero de tarjeta/i.test(t), parse: parseSantanderChecking, detectCard: () => 'Santander Débito', noCategoryGuess: true },
  // Próximo banco: sube un PDF de ejemplo al chat y se agrega aquí un parser nuevo.
];

async function handlePdfUpload(file){
  state.previewStatus = 'Leyendo PDF...';
  state.previewDebugText = null;
  renderImport();
  try{
    const text = await extractPdfText(file);
    const bankParser = BANK_PARSERS.find(b => b.detect(text));
    if(!bankParser){
      await handleAiPdfExtract(file);
      return;
    }
    state.previewBank = bankParser.name;
    const parsed = bankParser.parse(text);
    if(parsed.length === 0){
      state.previewDebugText = text;
      await handleAiPdfExtract(file);
      return;
    }

    // Detectar tarjeta a partir del PDF (ej. "Amex Platinum") — SOLO se agrega
    // como opción sugerida en el dropdown de cada fila (con "(nueva)" si no
    // existe todavía). Ya NO se preselecciona sola en ninguna fila — tienes que
    // elegirla a propósito (con el selector "Aplicar tarjeta a todas las filas"
    // o fila por fila) antes de poder confirmar el import, para evitar que un
    // PDF quede pegado sin querer a la tarjeta equivocada.
    state.pendingNewCards = [];
    let detectedCardName = '';
    if(bankParser.detectCard){
      const cardName = bankParser.detectCard(text);
      detectedCardName = cardName;
      const existing = state.cards.find(c => c.nombre.toLowerCase() === cardName.toLowerCase());
      if(!existing){
        state.pendingNewCards.push({ id: 'new-' + uid(), nombre: cardName });
      }
      showToast(`Parece ser: ${cardName} — selecciona la tarjeta antes de importar`);
    }

    // Detectar posibles duplicados contra lo que ya está importado (mismo día,
    // monto y descripción — sin importar la tarjeta, para no dejar pasar un
    // reimport si cambiaste la tarjeta antes de confirmar) — pasa fácil al
    // subir varios meses seguidos o si repites sin querer el mismo PDF.
    const existingKeys = new Map();
    state.transactions.forEach(t => {
      const k = `${t.fecha}|${Math.round(Number(t.monto)*100)}|${(t.descripcion||'').toLowerCase().trim()}`;
      if(!existingKeys.has(k)) existingKeys.set(k, { tarjeta: t.cardName, categoria: t.catName });
    });

    state.previewSortDir = null; // cada import nuevo empieza en orden del PDF/CSV
    state.previewRows = parsed.map(p => {
      const key = `${p.fecha}|${Math.round(p.monto*100)}|${p.descripcion.toLowerCase().trim()}`;
      const dupInfo = existingKeys.get(key);
      const isDup = !!dupInfo;
      existingKeys.set(key, dupInfo || { tarjeta: 'este mismo import', categoria: null }); // para detectar también duplicados repetidos dentro del mismo PDF
      return {
        ...p,
        id: uid(),
        include: !isDup,
        isDup,
        dupInfo,
        card: null,
        category: bankParser.noCategoryGuess ? null : guessCategoryId(p.descripcion),
      };
    });
    const dupCount = state.previewRows.filter(r=>r.isDup).length;
    if(dupCount > 0) showToast(`${dupCount} posible(s) duplicado(s) detectado(s) y desmarcado(s)`);
    state.previewStatus = '';
    renderImport();
  }catch(err){
    state.previewStatus = '';
    showToast('Error leyendo el PDF: ' + err.message);
    renderImport();
  }
}

// Fallback para PDFs sin capa de texto (ej. Santander débito escaneado) o de
// bancos aún no soportados por el parser regex: se manda el PDF completo a
// un endpoint serverless (/api/parse-pdf) que a su vez llama a la API de
// Claude para leerlo y devolver los movimientos en JSON. Así ya no hace
// falta pegar el PDF en el chat — el propio sistema lo procesa.
async function handleAiPdfExtract(file){
  state.previewDebugText = state.previewDebugText || null; // conserva el debug si ya se seteó antes de llamar
  state.previewStatus = 'Este PDF no tiene capa de texto o es de un banco sin parser rápido — convirtiendo páginas a imagen y leyendo con IA (puede tardar 20-40s)...';
  renderImport();
  try{
    let images = await pdfToImages(file);
    let totalSize = images.reduce((s,img)=>s+img.length, 0);
    if(totalSize > 3.8 * 1024 * 1024){
      // Muy pesado para el límite de Vercel (4.5MB) incluso como imágenes — reintenta más comprimido.
      images = await pdfToImages(file, 1100, 0.55);
      totalSize = images.reduce((s,img)=>s+img.length, 0);
    }
    if(images.length === 0){ throw new Error('No se pudo renderizar ninguna página del PDF'); }
    if(totalSize > 4.2 * 1024 * 1024){ throw new Error('El PDF es demasiado grande incluso comprimido (muchas páginas) — súbelo al chat mejor'); }
    const resp = await fetch('/api/parse-pdf', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ images }),
    });
    const data = await resp.json();
    if(!resp.ok){
      if(data.raw) state.previewDebugText = `[Respuesta cruda de la IA, no se pudo interpretar como JSON]\n\n${data.raw}`;
      throw new Error(data.error || `Error del servidor (${resp.status})`);
    }

    const parsed = (data.rows || []).filter(r => r && r.fecha && r.descripcion && typeof r.monto === 'number' && !isNaN(r.monto));
    if(parsed.length === 0){
      state.previewStatus = '';
      showToast('La IA no encontró movimientos en este PDF — revisa que sea legible, o súbelo al chat');
      renderImport();
      return;
    }

    state.previewBank = 'IA (Claude) — revisa cada renglón con cuidado';
    state.previewDebugText = null;
    state.pendingNewCards = [];
    const existingKeys = new Map();
    state.transactions.forEach(t => {
      const k = `${t.fecha}|${Math.round(Number(t.monto)*100)}|${(t.descripcion||'').toLowerCase().trim()}`;
      if(!existingKeys.has(k)) existingKeys.set(k, { tarjeta: t.cardName, categoria: t.catName });
    });
    state.previewSortDir = null; // cada import nuevo empieza en orden del PDF/CSV
    state.previewRows = parsed.map(p => {
      const key = `${p.fecha}|${Math.round(Number(p.monto)*100)}|${String(p.descripcion).toLowerCase().trim()}`;
      const dupInfo = existingKeys.get(key);
      const isDup = !!dupInfo;
      existingKeys.set(key, dupInfo || { tarjeta: 'este mismo import', categoria: null });
      return {
        id: uid(), include: !isDup, isDup, dupInfo,
        fecha: p.fecha, descripcion: String(p.descripcion), monto: Number(p.monto),
        card: null,
        category: guessCategoryId(String(p.descripcion)),
        cuotaActual: p.cuota_actual || null, cuotaTotal: p.cuota_total || null,
      };
    });
    const dupCount = state.previewRows.filter(r=>r.isDup).length;
    showToast(`IA leyó ${parsed.length} movimiento(s) — selecciona la tarjeta antes de importar${dupCount?`, ${dupCount} posible(s) duplicado(s)`:''}` + (data.truncated ? ' ⚠️ la respuesta se cortó, puede faltar el final del estado de cuenta — revisa' : ''));
    state.previewStatus = '';
    renderImport();
  }catch(err){
    state.previewStatus = '';
    state.previewRows = [];
    showToast('Error con IA: ' + err.message);
    renderImport();
  }
}

async function confirmPreviewImport(){
  const rows = state.previewRows.filter(r=>r.include);
  if(rows.length === 0){ showToast('No hay filas seleccionadas'); return; }
  const missingCard = rows.filter(r=>!r.card);
  if(missingCard.length > 0){
    showToast(`Falta elegir tarjeta en ${missingCard.length} fila(s) — usa "Aplicar tarjeta a todas las filas" o elige una por una`);
    return;
  }

  // Crear tarjetas pendientes que realmente se vayan a usar, justo ahora — no antes.
  const usedPendingIds = new Set(rows.map(r=>r.card));
  const idMap = {};
  for(const pending of state.pendingNewCards){
    if(!usedPendingIds.has(pending.id)) continue;
    const { data, error } = await sb.from('tarjetas').insert({ nombre: pending.nombre }).select().single();
    if(error){ showToast('Error creando tarjeta: '+error.message); return; }
    idMap[pending.id] = data.id;
    state.cards.push(data);
  }

  const batchId = crypto.randomUUID(); // permite deshacer este import completo después, si algo salió mal
  const inserts = rows.map(r => ({
    fecha: r.fecha, descripcion: r.descripcion, monto: r.monto,
    tarjeta_id: idMap[r.card] || r.card, categoria_id: r.category || null,
    cuota_actual: r.cuotaActual || null, cuota_total: r.cuotaTotal || null,
    import_batch_id: batchId,
  }));
  const { error } = await sb.from('movimientos').insert(inserts);
  if(error){ showToast('Error: '+error.message); return; }
  let retroTotal = 0;
  for(const r of rows){ retroTotal += (await learnCategory(r.category, r.descripcion)) || 0; }
  showToast(`${rows.length} movimientos importados` + (retroTotal ? ` · +${retroTotal} anterior(es) recategorizado(s) también` : ''));
  state.previewRows = [];
  state.previewBank = null;
  state.pendingNewCards = [];
  state.lastImportBatch = { id: batchId, count: rows.length };
  await loadAll();
  renderMonthStrip();
  renderImport();
}

// Borra de un jalón todos los movimientos del último lote importado (por
// import_batch_id) — para cuando algo salió mal (tarjeta equivocada, PDF
// repetido, etc.) y no quieres andar borrando fila por fila.
async function undoLastImport(){
  let batch = state.lastImportBatch;
  if(!batch){
    // No hay lote en memoria (ej. recargaste la página) — buscar el más reciente en la BD.
    const { data, error } = await sb.from('movimientos')
      .select('import_batch_id, created_at')
      .not('import_batch_id', 'is', null)
      .order('created_at', { ascending: false })
      .limit(1);
    if(error){ showToast('Error: '+error.message); return; }
    if(!data || data.length === 0){ showToast('No hay ninguna importación reciente para deshacer'); return; }
    const { count } = await sb.from('movimientos').select('id', { count: 'exact', head: true }).eq('import_batch_id', data[0].import_batch_id);
    batch = { id: data[0].import_batch_id, count: count || 0 };
  }
  if(!confirm(`¿Borrar los ${batch.count} movimiento(s) de la última importación? Esto no se puede deshacer.`)) return;
  const { error } = await sb.from('movimientos').delete().eq('import_batch_id', batch.id);
  if(error){ showToast('Error: '+error.message); return; }
  showToast(`${batch.count} movimiento(s) borrado(s)`);
  state.lastImportBatch = null;
  await loadAll();
  renderMonthStrip();
  renderAll();
}

/* ---------- Month strip ---------- */
function monthBounds(mk){
  const [y, m] = mk.split('-').map(Number);
  const pad = n => String(n).padStart(2,'0');
  const lastDay = new Date(y, m, 0).getDate(); // día 0 del mes siguiente = último día de este mes
  return { from: `${mk}-01`, to: `${mk}-${pad(lastDay)}` };
}

function renderMonthStrip(){
  const months = allMonths();
  if(!state.currentMonth || !months.includes(state.currentMonth)) state.currentMonth = months[0];
  // El periodo de Análisis sigue al tab de mes activo por default, a menos que
  // el usuario haya escogido explícitamente "Todo el año" u otro rango.
  if(!state.customRangeIsManual){
    const b = monthBounds(state.currentMonth);
    state.customFrom = b.from;
    state.customTo = b.to;
  }
  const strip = document.getElementById('monthStrip');
  strip.innerHTML = months.map(m => `<div class="month-tab ${m===state.currentMonth?'active':''}" data-month="${m}">${monthLabel(m)}</div>`).join('');
  strip.querySelectorAll('.month-tab').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.currentMonth = el.dataset.month;
      state.customRangeIsManual = false; // volver a seguir el tab de mes
      state.customDrilldownCat = null;
      renderAll();
    });
  });
}

/* ---------- Dashboard ---------- */
function renderDashboard(){

  const byCard = {}, byCat = {};
  monthTx.forEach(t=>{
    byCard[t.cardName] = (byCard[t.cardName]||0) + Number(t.monto);

  });

  const uncatBanner = uncatCount > 0 ? `

      <p style="margin:0;font-size:13px;color:var(--ink)">
        <strong>${uncatCount} movimiento${uncatCount===1?'':'s'} sin categorizar</strong> este mes — no cuentan en el total.
        Ve a <strong>Movimientos</strong> y asígnales categoría a los que sí sean gasto real.
      </p>
    </div>` : '';

  if(monthTxAll.length===0){
    el.innerHTML = `<div class="card"><div class="empty-state">Sin movimientos en ${monthLabel(state.currentMonth)} todavía.<br>Ve a <strong>Importar</strong> o agrega uno manual en <strong>Movimientos</strong>.</div></div>`;
    return;
  }
  const installmentsHtml = renderInstallmentsCard();

  const catRowsDash = catEntries.map(([name,amt])=>{
    const isSelected = state.dashDrilldownCat === name;
    const pct = Math.max((amt/maxCat*100), 3);
    const nameAttr = name.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,"\\'");
    return `<div class="catbar-row${isSelected?' selected':''}" onclick="handleDashCatClick('${nameAttr}')">
      <span class="catbar-name"><span class="cat-dot" style="background:${catColor(name)}"></span>${name}</span>
      <div class="catbar-track"><div class="catbar-fill" style="width:${pct.toFixed(1)}%;background:${catColor(name)}"></div></div>
      <span class="catbar-amt">${fmtMoney(amt)}</span>
    </div>`;
  }).join('');

  const cardEntries = Object.entries(byCard).sort((a,b)=>b[1]-a[1]);
  const maxCardAmt = cardEntries.length ? cardEntries[0][1] : 1;
  const cardRowsDash = cardEntries.map(([name,amt])=>{
    const isSelected = state.dashDrilldownCard === name;
    const pct = Math.max((amt/maxCardAmt*100), 3);
    const nameAttr = name.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,"\\'");
    return `<div class="catbar-row${isSelected?' selected':''}" onclick="handleDashCardClick('${nameAttr}')">
      <span class="catbar-name">${name}</span>
      <div class="catbar-track"><div class="catbar-fill" style="width:${pct.toFixed(1)}%;background:var(--accent)"></div></div>
      <span class="catbar-amt">${fmtMoney(amt)}</span>
    </div>`;
  }).join('');

  let dashDrilldownHtml = '';
  if(state.dashDrilldownCat || state.dashDrilldownCard){
    const label = state.dashDrilldownCat || state.dashDrilldownCard;
    const drillTx = monthTx.filter(t => state.dashDrilldownCat ? t.catName === state.dashDrilldownCat : t.cardName === state.dashDrilldownCard)
      .sort((a,b)=> b.fecha.localeCompare(a.fecha));
    dashDrilldownHtml = `
      <div class="card">
        <div class="flex-between">
          <p class="card-title" style="margin:0">Movimientos — ${label} <span class="small-muted">(${drillTx.length})</span></p>
          <button class="ghost" id="closeDashDrilldown">Cerrar</button>
        </div>
        <table>
          <thead><tr><th>Fecha</th><th>Descripción</th><th>Tarjeta</th><th style="text-align:right">Monto</th></tr></thead>
          <tbody>
            ${drillTx.map(t=>`<tr><td>${t.fecha}</td><td>${t.descripcion}</td><td><span class="card-pill">${t.cardName}</span></td><td class="amt-cell">${fmtMoney(Number(t.monto))}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  el.innerHTML = `
    ${uncatBanner}
    <div class="summary-row">
      <div class="card stat"><div class="num spend">${fmtMoney(total)}</div><div class="label">Gasto total · ${monthLabel(state.currentMonth)}</div></div>
      ${totalIngreso>0 ? `<div class="card stat"><div class="num" style="color:var(--accent)">${fmtMoney(totalIngreso)}</div><div class="label">Ingreso total</div></div>
      <div class="card stat"><div class="num">${fmtMoney(totalIngreso-total)}</div><div class="label">Balance neto</div></div>` : ''}
      ${totalAhorro>0 ? `<div class="card stat"><div class="num" style="color:#3C9AA6">${fmtMoney(totalAhorro)}</div><div class="label">Ahorro este mes</div></div>` : ''}

  const closeDashDrill = document.getElementById('closeDashDrilldown');
  if(closeDashDrill) closeDashDrill.addEventListener('click', ()=>{ state.dashDrilldownCat=null; state.dashDrilldownCard=null; renderDashboard(); });
  const toggleMsi = document.getElementById('toggleLiquidatedMsi');
  if(toggleMsi) toggleMsi.addEventListener('click', ()=>{ state.showLiquidatedMsi = !state.showLiquidatedMsi; renderDashboard(); });
}

function handleDashCatClick(name){

function handleDashCardClick(name){
  state.dashDrilldownCard = (state.dashDrilldownCard === name) ? null : name;

// Agrupa todos los movimientos con cuota_total (compras a meses / MSI) por
// descripción normalizada + tarjeta, y arma una tarjeta de avance por plan.
function renderInstallmentsCard(){
  const msiTx = state.transactions.filter(t=>t.cuota_total);
  if(msiTx.length === 0) return '';
  const groups = {};
  msiTx.forEach(t=>{
    const key = merchantKey(t.descripcion) + '|' + t.tarjeta_id;
    if(!groups[key]) groups[key] = { descripcion: t.descripcion, cardName: t.cardName, monto: Number(t.monto), cuotaTotal: t.cuota_total, cuotaMax: 0 };
    groups[key].cuotaMax = Math.max(groups[key].cuotaMax, t.cuota_actual || 0);
    groups[key].cuotaTotal = Math.max(groups[key].cuotaTotal, t.cuota_total);
    groups[key].monto = Number(t.monto); // se queda con el monto de la cuota más reciente vista
  });
  const allPlans = Object.values(groups).sort((a,b)=> (b.cuotaTotal-b.cuotaMax) - (a.cuotaTotal-a.cuotaMax));
  const activePlans = allPlans.filter(p => (p.cuotaTotal - p.cuotaMax) > 0);
  const liquidatedCount = allPlans.length - activePlans.length;
  const plans = state.showLiquidatedMsi ? allPlans : activePlans;
  if(plans.length === 0 && liquidatedCount === 0) return '';
  return `
    <div class="card">
      <div class="flex-between">
        <p class="card-title" style="margin:0">Compras a meses (MSI)</p>
        ${liquidatedCount > 0 ? `<button class="ghost" id="toggleLiquidatedMsi" style="font-size:11px;padding:4px 10px">${state.showLiquidatedMsi ? 'Ocultar liquidadas' : `Mostrar liquidadas (${liquidatedCount})`}</button>` : ''}
      </div>
      ${plans.length === 0 ? `<div class="empty-state" style="padding:16px 0">Sin planes MSI activos.</div>` : plans.map(p=>{
        const faltan = p.cuotaTotal - p.cuotaMax;
        const pct = Math.min(100, (p.cuotaMax / p.cuotaTotal * 100));
        return `<div style="margin-bottom:12px">
          <div class="cat-line" style="border-bottom:none;padding:2px 0">
            <span class="cat-name" style="flex:1">${p.descripcion} <span class="card-pill">${p.cardName}</span></span>
            <span class="cat-amt">${faltan<=0 ? 'Liquidado' : `faltan ${faltan} cuota${faltan===1?'':'s'} · ${fmtMoney(p.monto*faltan)}`}</span>
          </div>
          <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${pct.toFixed(1)}%;background:${faltan<=0?'var(--muted)':'var(--accent)'}"></div></div>
          <div class="small-muted" style="margin-top:2px">Cuota ${p.cuotaMax} de ${p.cuotaTotal} · ${fmtMoney(p.monto)}/mes</div>
        </div>`;
      }).join('')}
    </div>`;
}

      <div class="summary-row" style="margin-bottom:12px">
        <div class="card stat"><div class="num spend">${fmtMoney(sumGasto)}</div><div class="label">Gasto en este período</div></div>
        ${sumIngreso>0 ? `<div class="card stat"><div class="num" style="color:var(--accent)">${fmtMoney(sumIngreso)}</div><div class="label">Ingreso</div></div>
        <div class="card stat"><div class="num">${fmtMoney(sumIngreso-sumGasto)}</div><div class="label">Balance neto</div></div>` : ''}
        ${sumAhorro!==0 ? `<div class="card stat"><div class="num" style="color:#3C9AA6">${fmtMoney(sumAhorro)}</div><div class="label">Ahorro</div></div>` : ''}
        ${sumNeutral!==0 ? `<div class="card stat"><div class="num" style="color:var(--muted)">${fmtMoney(sumNeutral)}</div><div class="label">No cuenta (traspasos, etc.)</div></div>` : ''}
        ${sumUncat>0 ? `<div class="card stat"><div class="num" style="color:var(--alert)">${sumUncat}</div><div class="label">Sin categorizar (no incluidos arriba)</div></div>` : ''}

      <div class="form-grid" style="margin-bottom:6px">
        <div><label>Ver</label>
          <select id="txModeSel">
            <option value="month" ${!state.txRangeActive?'selected':''}>Por mes (pestañas de arriba)</option>
            <option value="range" ${state.txRangeActive?'selected':''}>Rango de fechas / todo el historial</option>
          </select>
        </div>
        ${state.txRangeActive ? `
        <div><label>Desde</label><input type="date" id="txFromInput" value="${state.txFrom}"></div>
        <div><label>Hasta</label><input type="date" id="txToInput" value="${state.txTo}"></div>
        <div style="align-self:end"><button class="ghost" id="txAllHistoryBtn">Todo el historial</button></div>` : ''}
        <div><label>Buscar descripción</label><input type="text" id="txSearchInput" value="${state.txSearch}" placeholder="ej. Jesus del Monte"></div>
      </div>
      <div class="form-grid" style="margin-bottom:12px">
        <div><label>Filtrar por tarjeta</label><select id="filterCardSel"><option value="">Todas</option>${state.cards.map(c=>`<option value="${c.id}" ${c.id===state.filterCard?'selected':''}>${c.nombre}</option>`).join('')}</select></div>
        <div><label>Filtrar por categoría</label><select id="filterCatSel"><option value="">Todas</option>${state.categories.map(c=>`<option value="${c.id}" ${c.id===state.filterCat?'selected':''}>${c.nombre}</option>`).join('')}</select></div>
        ${(state.filterCard || state.filterCat) ? `<div style="align-self:end"><button class="ghost" id="clearFilterBtn">Quitar filtros</button></div>` : ''}
      </div>
      ${monthTx.length===0 ? `<div class="empty-state">Sin movimientos con este filtro.</div>` : `
      <table>
        <thead><tr><th>Fecha</th><th>Descripción</th><th>Tarjeta</th><th>Categoría</th><th style="text-align:right">Monto</th><th></th></tr></thead>
        <tbody>
          ${monthTx.map(t=>`
            <tr>
              <td>${t.fecha}</td>
              <td>${t.descripcion}${t.cuota_total ? `<span class="msi-pill ${t.cuota_actual>=t.cuota_total?'done':''}" title="${t.cuota_actual>=t.cuota_total?'Última cuota':`Faltan ${t.cuota_total - t.cuota_actual} cuota(s)`}">MSI ${t.cuota_actual}/${t.cuota_total}</span>` : ''}</td>
              <td>
                <select data-cardedit="${t.id}">
                  ${state.cards.map(c=>`<option value="${c.id}" ${c.id===t.tarjeta_id?'selected':''}>${c.nombre}</option>`).join('')}
                </select>
              </td>
              <td>
                <select data-catedit="${t.id}" style="${t.catName?'':'border-color:var(--alert);color:var(--alert)'}">
                  <option value="" ${!t.catName?'selected':''}>— Sin categorizar —</option>
                  ${state.categories.map(c=>`<option value="${c.id}" ${c.id===t.categoria_id?'selected':''}>${c.nombre}</option>`).join('')}
                </select>
              </td>
              <td class="amt-cell" style="${t.catTipo==='ingreso'?'color:var(--accent)':(t.catTipo==='neutral'?'color:var(--muted)':(t.catTipo==='ahorro'?'color:#3C9AA6':''))}">${fmtMoney(Number(t.monto))}</td>
              <td class="row-actions"><button data-del="${t.id}" title="Eliminar">✕</button></td>
            </tr>`).join('')}
        </tbody>
      </table>`}
    </div>`;

  document.getElementById('txModeSel').addEventListener('change', (e)=>{
    state.txRangeActive = e.target.value === 'range';
    renderTransactions();
  });
  const fromInput = document.getElementById('txFromInput');
  if(fromInput) fromInput.addEventListener('change', (e)=>{ state.txFrom = e.target.value; renderTransactions(); });
  const toInput = document.getElementById('txToInput');
  if(toInput) toInput.addEventListener('change', (e)=>{ state.txTo = e.target.value; renderTransactions(); });
  const allHistoryBtn = document.getElementById('txAllHistoryBtn');
  if(allHistoryBtn) allHistoryBtn.addEventListener('click', ()=>{ state.txFrom=''; state.txTo=''; renderTransactions(); });
  document.getElementById('txSearchInput').addEventListener('input', (e)=>{
    state.txSearch = e.target.value;
    const cursorPos = e.target.selectionStart;
    renderTransactions();
    const newInput = document.getElementById('txSearchInput');
    if(newInput){ newInput.focus(); newInput.setSelectionRange(cursorPos, cursorPos); }
  });
  document.getElementById('filterCardSel').addEventListener('change', (e)=>{ state.filterCard = e.target.value; renderTransactions(); });
  document.getElementById('filterCatSel').addEventListener('change', (e)=>{ state.filterCat = e.target.value; renderTransactions(); });
  const clearBtn = document.getElementById('clearFilterBtn');
  if(clearBtn) clearBtn.addEventListener('click', ()=>{ state.filterCard=''; state.filterCat=''; renderTransactions(); });
  document.getElementById('addTxBtn').addEventListener('click', async ()=>{
    const date = document.getElementById('txDate').value;
    const desc = document.getElementById('txDesc').value.trim();
    const amt = parseFloat(document.getElementById('txAmt').value);
    const card = document.getElementById('txCard').value;
    const cat = document.getElementById('txCat').value;
    const cuotaActualRaw = document.getElementById('txCuotaActual').value;
    const cuotaTotalRaw = document.getElementById('txCuotaTotal').value;
    const cuotaActual = cuotaActualRaw ? parseInt(cuotaActualRaw, 10) : null;
    const cuotaTotal = cuotaTotalRaw ? parseInt(cuotaTotalRaw, 10) : null;
    if(!date || !desc || isNaN(amt)){ showToast('Completa fecha, descripción y monto'); return; }
    if((cuotaActual && !cuotaTotal) || (!cuotaActual && cuotaTotal)){ showToast('Para MSI llena cuota actual Y cuota total'); return; }
    const { error } = await sb.from('movimientos').insert({
      fecha:date, descripcion:desc, monto:amt, tarjeta_id:card, categoria_id:cat,
      cuota_actual: cuotaActual, cuota_total: cuotaTotal,
    });
    if(error){ showToast('Error: '+error.message); return; }
    showToast('Movimiento agregado');
    await loadAll(); renderAll();
  });
  el.querySelectorAll('[data-catedit]').forEach(sel=>{
    sel.addEventListener('change', async ()=>{
      const { error } = await sb.from('movimientos').update({ categoria_id: sel.value || null }).eq('id', sel.dataset.catedit);
      if(error){ showToast('Error: '+error.message); return; }
      if(sel.value){
        const tx = state.transactions.find(t=>t.id===sel.dataset.catedit);
        const retroCount = tx ? await learnCategory(sel.value, tx.descripcion) : 0;
        showToast('Categoría actualizada' + (retroCount ? ` · +${retroCount} anterior(es) también` : ''));
      } else {
        showToast('Categoría actualizada');
      }
      await loadAll(); renderAll();
    });
  });
  el.querySelectorAll('[data-cardedit]').forEach(sel=>{
    sel.addEventListener('change', async ()=>{
      const { data, error } = await sb.from('movimientos').update({ tarjeta_id: sel.value }).eq('id', sel.dataset.cardedit).select();
      if(error){ showToast('Error: '+error.message); return; }
      if(!data || data.length === 0){ showToast('No se encontró el movimiento a actualizar'); return; }
      showToast('Tarjeta actualizada');
      await loadAll(); renderAll();
    });
  });
  el.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const { error } = await sb.from('movimientos').delete().eq('id', btn.dataset.del);
      if(error){ showToast('Error: '+error.message); return; }
      showToast('Eliminado'); await loadAll(); renderAll();
    });
  });
}

/* ---------- Import view ---------- */
function renderImport(){
  const el = document.getElementById('viewImport');
  const otroCat = state.categories.find(c=>c.nombre==='Otro');
  const otroId = otroCat ? otroCat.id : null;
  const needsReview = r => !r.category || r.category === otroId;
  const needsCard = r => !r.card;
  if(state.previewSortDir === undefined) state.previewSortDir = null; // null = orden en que vino del PDF/CSV
  const sortedRows = state.previewSortDir
    ? [...state.previewRows].sort((a,b) =>
        state.previewSortDir === 'asc' ? a.fecha.localeCompare(b.fecha) : b.fecha.localeCompare(a.fecha))
    : state.previewRows;
  const sortArrow = state.previewSortDir === 'asc' ? '▲' : state.previewSortDir === 'desc' ? '▼' : '↕';
  const sortTitle = state.previewSortDir === 'asc' ? 'Ordenado ascendente — clic para descendente'
    : state.previewSortDir === 'desc' ? 'Ordenado descendente — clic para volver al orden del PDF'
    : 'Orden tal como viene en el PDF/CSV — clic para ordenar por fecha';

  const previewSection = state.previewRows.length ? `
    <div class="card">
      <div class="flex-between">
        <p class="card-title" style="margin:0">Revisa antes de importar <span class="bank-badge">${state.previewBank}</span></p>
        <span class="small-muted">${state.previewRows.filter(r=>r.include).length} de ${state.previewRows.length} seleccionados · <strong>${fmtMoney(state.previewRows.filter(r=>r.include).reduce((s,r)=>s+(Number(r.monto)||0),0))}</strong>${state.previewRows.filter(needsCard).length ? ` · <span style="color:var(--alert)">${state.previewRows.filter(needsCard).length} sin tarjeta</span>` : ''}${state.previewRows.filter(needsReview).length ? ` · <span style="color:var(--alert)">${state.previewRows.filter(needsReview).length} sin categoría clara (Otro)</span>` : ''}</span>
      </div>
      <p class="hint">El parser de PDF es beta — revisa montos y fechas antes de confirmar. Desmarca lo que no quieras importar.</p>
      <div class="form-grid" style="margin-bottom:12px">
        <div><label>Aplicar tarjeta a todas las filas</label>
          <select id="bulkCardSel">
            <option value="">— elegir —</option>
            ${[...state.cards, ...state.pendingNewCards].map(c=>`<option value="${c.id}">${c.nombre}${state.pendingNewCards.find(p=>p.id===c.id)?' (nueva)':''}</option>`).join('')}
          </select>
        </div>
        <div><label>Aplicar categoría a todas las filas</label>
          <select id="bulkCatSel">
            <option value="">— elegir —</option>
            ${state.categories.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}
          </select>
        </div>
      </div>
      <div style="overflow-x:auto">
      <table class="preview-table">
        <thead><tr><th></th><th id="previewSortDate" style="cursor:pointer;user-select:none" title="${sortTitle}">Fecha ${sortArrow}</th><th>Descripción</th><th>Monto</th><th>Tarjeta</th><th>Categoría</th><th>Cuota (MSI)</th><th></th></tr></thead>
        <tbody>
          ${sortedRows.map(r=>`
            <tr class="${r.include?'':'excl'} ${(needsReview(r)||needsCard(r))?'no-cat':''}" data-pid="${r.id}">
              <td><input type="checkbox" data-pchk="${r.id}" ${r.include?'checked':''}></td>
              <td><input type="date" data-pfield="fecha" data-pid2="${r.id}" value="${r.fecha}" style="width:130px"></td>
              <td><input type="text" data-pfield="descripcion" data-pid2="${r.id}" value="${r.descripcion.replace(/"/g,'&quot;')}" style="min-width:320px">${r.isDup?` <span class="bank-badge" style="background:var(--alert-soft);color:var(--alert)" title="Ya existe un movimiento guardado con esta misma fecha, monto y descripción">posible duplicado — ya existe en ${r.dupInfo?.tarjeta || '?'}${r.dupInfo?.categoria ? ` (${r.dupInfo.categoria})` : ''}</span>`:''}</td>
              <td><input type="number" step="0.01" data-pfield="monto" data-pid2="${r.id}" value="${r.monto}" style="width:90px"></td>
              <td><select data-pfield="card" data-pid2="${r.id}" style="min-width:150px;${needsCard(r)?'border-color:var(--alert);color:var(--alert)':''}"><option value="" ${!r.card?'selected':''}>— elegir —</option>${[...state.cards, ...state.pendingNewCards].map(c=>`<option value="${c.id}" ${c.id===r.card?'selected':''}>${c.nombre}${state.pendingNewCards.find(p=>p.id===c.id)?' (nueva)':''}</option>`).join('')}</select></td>
              <td><select data-pfield="category" data-pid2="${r.id}" style="min-width:150px;${needsReview(r)?'border-color:var(--alert);color:var(--alert)':''}"><option value="" ${!r.category?'selected':''}>— Sin categoría —</option>${state.categories.map(c=>`<option value="${c.id}" ${c.id===r.category?'selected':''}>${c.nombre}</option>`).join('')}</select></td>
              <td style="white-space:nowrap">
                <input type="number" min="1" data-pfield="cuotaActual" data-pid2="${r.id}" value="${r.cuotaActual||''}" placeholder="ej.9" style="width:52px;display:inline-block">
                /
                <input type="number" min="1" data-pfield="cuotaTotal" data-pid2="${r.id}" value="${r.cuotaTotal||''}" placeholder="ej.12" style="width:52px;display:inline-block">
              </td>
              <td><button data-prm="${r.id}" title="Quitar de la lista" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px">✕</button></td>
            </tr>`).join('')}
        </tbody>
      </table>
      </div>
      <p class="small-muted" style="margin-top:6px">El checkbox desmarca sin quitar la fila (útil si dudas). El ✕ la quita por completo de esta lista.</p>
      <div style="margin-top:12px;display:flex;gap:10px">
        <button class="primary" id="confirmPreviewBtn">Importar seleccionados</button>
        <button class="ghost" id="cancelPreviewBtn">Cancelar</button>
      </div>
    </div>` : '';

  const debugSection = state.previewDebugText ? `
    <div class="card">
      <p class="card-title">Texto extraído del PDF (debug)</p>
      <p class="hint">No encontré movimientos con el patrón esperado. Copia este texto y pégamelo en el chat — así ajusto el parser contra lo que realmente extrae tu PDF, en vez de adivinar.</p>
      <textarea readonly style="min-height:220px">${state.previewDebugText.replace(/</g,'&lt;')}</textarea>
    </div>` : '';

  el.innerHTML = `
    <div class="card">
      <p class="card-title">Subir PDF de estado de cuenta</p>
      <label class="dropzone" id="dropzone" for="pdfFileInput">
        ${state.previewStatus ? `<span class="dz-label"><span class="spinner"></span>${state.previewStatus}</span>` : `
        <span class="dz-label">Arrastra el PDF aquí o haz clic para elegir el archivo</span>
        <div class="dz-sub">Parser rápido: ${BANK_PARSERS.map(b=>b.name).join(', ')}. Cualquier otro PDF (incluye escaneados sin texto, como Santander débito) se lee automático con IA — ya no hace falta subirlo al chat.</div>`}
        <input type="file" id="pdfFileInput" accept="application/pdf">
      </label>
    </div>
    ${previewSection}
    ${debugSection}
    <div class="card">
      <p class="card-title">Importar movimientos (CSV manual)</p>
      <p class="hint">Alternativa si tu banco aún no tiene parser de PDF. Pega líneas <code>fecha,descripción,monto,tarjeta</code> — una por línea, fecha en <code>YYYY-MM-DD</code>. Categoría se asigna sola por palabra clave. Para compras a meses (MSI), agrega dos columnas opcionales: <code>cuota_actual,cuota_total</code>. Ejemplo:<br>
      <code>2026-06-14,UBER EATS CDMX,245.50,Amex</code><br>
      <code>2026-06-14,ALETA AZUL POLANCO,1006.42,Santander Platinum,9,12</code></p>
      <textarea id="csvInput" placeholder="2026-06-14,UBER EATS CDMX,245.50,Amex"></textarea>
      <div style="margin-top:10px;display:flex;gap:14px;align-items:center;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);text-transform:none;letter-spacing:0;font-family:'Inter'">
          <input type="checkbox" id="csvNoCategory" style="width:auto">
          Dejar sin categorizar (no cuenta en totales hasta que le pongas categoría — recomendado para cuentas de débito)
        </label>
      </div>
      <div style="margin-top:10px;display:flex;gap:10px;align-items:center">
        <button class="primary" id="parseBtn">Importar líneas</button>
        <span class="small-muted" id="importStatus"></span>
      </div>
    </div>
    <div class="card">
      <p class="card-title">¿Te equivocaste?</p>
      <p class="hint">Borra de un jalón todos los movimientos de la última importación confirmada (PDF, IA o CSV) — útil si quedaron con la tarjeta equivocada, se te coló un PDF repetido, o cualquier otro error. No afecta movimientos agregados a mano uno por uno.</p>
      <button class="ghost" id="undoImportBtn" style="color:var(--alert);border-color:var(--alert)">Deshacer última importación</button>
    </div>`;

  document.getElementById('undoImportBtn').addEventListener('click', undoLastImport);
  document.getElementById('pdfFileInput').addEventListener('change', (e)=>{
    if(e.target.files[0]) handlePdfUpload(e.target.files[0]);
  });
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', ()=> dz.classList.remove('drag'));
  dz.addEventListener('drop', e=>{
    e.preventDefault(); dz.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if(f && f.type === 'application/pdf') handlePdfUpload(f);
  });

  if(state.previewRows.length){
    el.querySelectorAll('[data-pchk]').forEach(chk=>{
      chk.addEventListener('change', ()=>{
        const row = state.previewRows.find(r=>r.id===chk.dataset.pchk);
        row.include = chk.checked;
        renderImport();
      });
    });
    const sortDateBtn = document.getElementById('previewSortDate');
    if(sortDateBtn) sortDateBtn.addEventListener('click', ()=>{
      state.previewSortDir = state.previewSortDir === null ? 'asc' : state.previewSortDir === 'asc' ? 'desc' : null;
      renderImport();
    });
    const bulkCardSel = document.getElementById('bulkCardSel');
    if(bulkCardSel) bulkCardSel.addEventListener('change', ()=>{
      if(!bulkCardSel.value) return;
      state.previewRows.forEach(r => r.card = bulkCardSel.value);
      showToast(`Tarjeta aplicada a las ${state.previewRows.length} filas`);
      renderImport();
    });
    const bulkCatSel = document.getElementById('bulkCatSel');
    if(bulkCatSel) bulkCatSel.addEventListener('change', ()=>{
      if(!bulkCatSel.value) return;
      state.previewRows.forEach(r => r.category = bulkCatSel.value);
      showToast(`Categoría aplicada a las ${state.previewRows.length} filas`);
      renderImport();
    });
    el.querySelectorAll('[data-prm]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.previewRows = state.previewRows.filter(r=>r.id!==btn.dataset.prm);
        renderImport();
      });
    });
    el.querySelectorAll('[data-pfield]').forEach(inp=>{
      inp.addEventListener('change', ()=>{
        const row = state.previewRows.find(r=>r.id===inp.dataset.pid2);
        const field = inp.dataset.pfield;
        if(field === 'monto') row[field] = parseFloat(inp.value);
        else if(field === 'cuotaActual' || field === 'cuotaTotal') row[field] = inp.value ? parseInt(inp.value,10) : null;
        else row[field] = inp.value;
        if(field === 'category' || field === 'card') renderImport();
      });
    });
    document.getElementById('confirmPreviewBtn').addEventListener('click', confirmPreviewImport);
    document.getElementById('cancelPreviewBtn').addEventListener('click', ()=>{
      state.previewRows = []; state.previewBank = null; state.pendingNewCards = []; renderImport();
    });
  }

  document.getElementById('parseBtn').addEventListener('click', async ()=>{
    const raw = document.getElementById('csvInput').value.trim();
    const noCategory = document.getElementById('csvNoCategory').checked;
    if(!raw){ showToast('Pega al menos una línea'); return; }
    const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
    let skipped = 0, dupCount = 0;
    const existingKeys = new Map();
    state.transactions.forEach(t => {
      const k = `${t.fecha}|${Math.round(Number(t.monto)*100)}|${(t.descripcion||'').toLowerCase().trim()}`;
      if(!existingKeys.has(k)) existingKeys.set(k, { tarjeta: t.cardName, categoria: t.catName });
    });
    const rows = [];
    for(const line of lines){
      const parts = line.split(',').map(p=>p.trim());
      if(parts.length < 3){ skipped++; continue; }
      const [date, desc, amtStr, cardName, cuotaActualStr, cuotaTotalStr] = parts;
      const amount = parseFloat(amtStr);
      if(!/^\d{4}-\d{2}-\d{2}$/.test(date) || !desc || isNaN(amount)){ skipped++; continue; }
      const cuotaActual = cuotaActualStr ? parseInt(cuotaActualStr,10) : null;
      const cuotaTotal = cuotaTotalStr ? parseInt(cuotaTotalStr,10) : null;
      let card = cardName ? state.cards.find(c=>c.nombre === cardName) : null;
      if(cardName && !card){
        const { data } = await sb.from('tarjetas').insert({ nombre: cardName }).select().single();
        card = data; state.cards.push(card);
      }
      const key = `${date}|${Math.round(amount*100)}|${desc.toLowerCase().trim()}`;
      const dupInfo = existingKeys.get(key);
      const isDup = !!dupInfo;
      if(isDup) dupCount++;
      existingKeys.set(key, dupInfo || { tarjeta: 'este mismo pegado', categoria: null }); // para detectar también duplicados repetidos dentro del mismo pegado
      rows.push({
        id: uid(), include: !isDup, isDup, dupInfo,
        fecha: date, descripcion: desc, monto: amount,
        card: card ? card.id : null,
        category: noCategory ? null : guessCategoryId(desc),
        cuotaActual, cuotaTotal,
      });
    }
    if(rows.length === 0){
      document.getElementById('importStatus').textContent = `Nada que revisar — ${skipped} línea(s) omitida(s) por formato inválido.`;
      return;
    }
    state.previewSortDir = null; // cada import nuevo empieza en orden del PDF/CSV
    state.previewRows = rows;
    state.previewBank = 'CSV manual';
    state.pendingNewCards = [];
    if(dupCount > 0) showToast(`${dupCount} posible(s) duplicado(s) detectado(s) y desmarcado(s)`);
    if(skipped > 0) showToast(`${skipped} línea(s) omitida(s) por formato inválido`);
    document.getElementById('csvInput').value = '';
    renderImport();
  });
}

/* ---------- Settings view ---------- */
