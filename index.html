      <table>
        <thead><tr><th>Nombre</th><th></th><th></th></tr></thead>
        <tbody>
          ${state.cards.map(c=>`
            <tr data-cardrow="${c.id}">
              <td><input type="text" data-cardfield="nombre" value="${c.nombre.replace(/"/g,'&quot;')}" style="min-width:200px"></td>
              <td><button class="ghost" data-savecard="${c.id}">Guardar</button></td>
              <td><button data-rmcard="${c.id}" title="Eliminar" style="background:none;border:none;cursor:pointer;color:var(--muted)">✕</button></td>
            </tr>`).join('')}
          <tr>
            <td><input type="text" id="newCard" placeholder="Nombre de tarjeta, ej. BBVA Oro"></td>
            <td colspan="2"><button class="primary" id="addCardBtn">Agregar tarjeta</button></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="card">
      <p class="card-title">Categorías</p>
      <p class="hint">Edita nombre, tipo, color o palabras clave directo en la tabla y dale "Guardar" en esa fila. Las palabras clave se comparan contra la descripción del movimiento (sin mayúsculas) para categorizar solo al importar. Marca una categoría como <strong>Ingreso</strong> (ej. "Nómina", "Reembolsos") para que sume aparte y no se mezcle con tu gasto. Marca <strong>No cuenta</strong> (ej. "Traspasos entre mis cuentas") para movimientos que no son ni gasto ni ingreso real — quedan registrados pero no suman ni restan en ningún total. Marca <strong>Ahorro</strong> (ej. "Aportación a inversión", "CETES") para dinero que apartas — no es gasto (no lo perdiste), no es ingreso, y a diferencia de "No cuenta" sí quieres verlo destacado aparte como cuánto ahorraste.</p>
      <table>
        <thead><tr><th></th><th>Nombre</th><th>Tipo</th><th>Palabras clave</th><th></th><th></th></tr></thead>
        <tbody>
          ${state.categories.map(c=>`
            <tr data-catrow="${c.id}">
              <td><input type="color" data-catfield="color" value="${c.color}" style="width:36px;height:30px;padding:2px;border:1px solid var(--line)"></td>
              <td><input type="text" data-catfield="nombre" value="${c.nombre.replace(/"/g,'&quot;')}" style="min-width:130px"></td>
              <td><select data-catfield="tipo" style="min-width:90px">
                <option value="gasto" ${(c.tipo||'gasto')==='gasto'?'selected':''}>Gasto</option>
                <option value="ingreso" ${c.tipo==='ingreso'?'selected':''}>Ingreso</option>
                <option value="neutral" ${c.tipo==='neutral'?'selected':''}>No cuenta</option>
                <option value="ahorro" ${c.tipo==='ahorro'?'selected':''}>Ahorro</option>
              </select></td>
              <td><input type="text" data-catfield="keywords" value="${(c.keywords||[]).join(', ').replace(/"/g,'&quot;')}" style="min-width:280px"></td>
              <td><button class="ghost" data-savecat="${c.id}">Guardar</button></td>
              <td><button data-rmcat="${c.id}" title="Eliminar" style="background:none;border:none;cursor:pointer;color:var(--muted)">✕</button></td>
            </tr>`).join('')}
          <tr>
            <td></td>
            <td><input type="text" id="newCat" placeholder="Nueva categoría"></td>
            <td><select id="newCatTipo" style="min-width:90px">
              <option value="gasto" selected>Gasto</option>
              <option value="ingreso">Ingreso</option>
              <option value="neutral">No cuenta</option>
              <option value="ahorro">Ahorro</option>
            </select></td>
            <td><input type="text" id="newCatKeywords" placeholder="Palabras clave, separadas por coma"></td>
            <td colspan="2"><button class="primary" id="addCatBtn">Agregar</button></td>
          </tr>
        </tbody>
      </table>
    </div>`;
  document.getElementById('addCardBtn').addEventListener('click', async ()=>{
    const v = document.getElementById('newCard').value.trim();
    if(!v) return;
    const { error } = await sb.from('tarjetas').insert({ nombre: v });
    if(error){ showToast('Error: '+error.message); return; }
    showToast('Tarjeta agregada'); await loadAll(); renderAll();
  });
  el.querySelectorAll('[data-savecard]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const row = el.querySelector(`[data-cardrow="${btn.dataset.savecard}"]`);
      const nombre = row.querySelector('[data-cardfield="nombre"]').value.trim();
      if(!nombre){ showToast('El nombre no puede quedar vacío'); return; }
      const { error } = await sb.from('tarjetas').update({ nombre }).eq('id', btn.dataset.savecard);
      if(error){ showToast('Error: '+error.message); return; }
      showToast('Tarjeta renombrada'); await loadAll(); renderAll();
    });
  });
  document.getElementById('addCatBtn').addEventListener('click', async ()=>{
    const v = document.getElementById('newCat').value.trim();
    if(!v) return;
    const tipo = document.getElementById('newCatTipo').value;
    const kwRaw = document.getElementById('newCatKeywords').value.trim();
    const keywords = kwRaw ? kwRaw.split(',').map(k=>k.trim().toLowerCase()).filter(Boolean) : [];
    const palette = ['#2F6F5E','#B0472A','#5B6EE1','#8A5FBF','#C9860A','#3C9AA6','#A34E8C'];
    const { error } = await sb.from('categorias').insert({ nombre: v, color: palette[state.categories.length % palette.length], keywords, tipo });
    if(error){ showToast('Error: '+error.message); return; }
    showToast('Categoría agregada'); await loadAll(); renderAll();
  });
  el.querySelectorAll('[data-savecat]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const row = el.querySelector(`[data-catrow="${btn.dataset.savecat}"]`);
      const nombre = row.querySelector('[data-catfield="nombre"]').value.trim();
      const color = row.querySelector('[data-catfield="color"]').value;
      const tipo = row.querySelector('[data-catfield="tipo"]').value;
      const kwRaw = row.querySelector('[data-catfield="keywords"]').value.trim();
      const keywords = kwRaw ? kwRaw.split(',').map(k=>k.trim().toLowerCase()).filter(Boolean) : [];
      if(!nombre){ showToast('El nombre no puede quedar vacío'); return; }
      const { error } = await sb.from('categorias').update({ nombre, color, keywords, tipo }).eq('id', btn.dataset.savecat);
      if(error){ showToast('Error: '+error.message); return; }
      showToast('Categoría actualizada'); await loadAll(); renderAll();
    });
  });
  el.querySelectorAll('[data-rmcard]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      await sb.from('tarjetas').delete().eq('id', btn.dataset.rmcard);
      await loadAll(); renderAll();
    });
  });
  el.querySelectorAll('[data-rmcat]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      await sb.from('categorias').delete().eq('id', btn.dataset.rmcat);
      await loadAll(); renderAll();
    });
  });
}

/* ---------- Análisis view ---------- */
function renderAnalysis(){
  const el = document.getElementById('viewAnalisis');
  if(state.transactions.length === 0){
    el.innerHTML = `<div class="card"><div class="empty-state">Todavía no hay movimientos para analizar. Importa algo primero.</div></div>`;
    return;
  }

  // Gasto total por mes (solo movimientos categorizados como GASTO — antes
  // sumaba cualquier cosa con categoría, mezclando ingreso/ahorro/no cuenta
  // como si todo fuera gasto, lo que inflaba muchísimo el número)
  const byMonth = {};
  state.transactions.filter(t=>t.catTipo==='gasto').forEach(t=>{
    const mk = monthKey(t.fecha);
    byMonth[mk] = (byMonth[mk] || 0) + Number(t.monto);
  });
  const monthsAsc = Object.keys(byMonth).sort().slice(-12); // últimos 12 con datos
  const maxMonth = Math.max(...monthsAsc.map(m=>byMonth[m]), 1);

  // Gráfica de barras SVG — meses en X, gasto en Y
  const chartW = 900, chartH = 240, padL = 10, padB = 34, barGap = 10;
  const barW = monthsAsc.length ? (chartW - padL*2 - barGap*(monthsAsc.length-1)) / monthsAsc.length : 0;
  const bars = monthsAsc.map((m, i) => {
    const val = byMonth[m];
    const h = (val / maxMonth) * (chartH - padB - 24);
    const x = padL + i * (barW + barGap);
    const y = chartH - padB - h;
    const isCurrent = m === state.currentMonth;
    return `
      <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}"
            fill="${isCurrent ? 'var(--accent)' : 'var(--line)'}" rx="2"></rect>
      <text x="${(x+barW/2).toFixed(1)}" y="${(y-6).toFixed(1)}" text-anchor="middle"
            font-family="IBM Plex Mono, monospace" font-size="10" fill="var(--ink-soft)">${(val/1000).toFixed(1)}k</text>
      <text x="${(x+barW/2).toFixed(1)}" y="${chartH-14}" text-anchor="middle"
            font-family="IBM Plex Mono, monospace" font-size="10" fill="var(--muted)">${monthLabel(m)}</text>
    `;
  }).join('');

  // Comparación mes actual vs mes anterior, por categoría
  const months = allMonths(); // desc
  const curIdx = months.indexOf(state.currentMonth);
  const prevMonth = curIdx >= 0 && curIdx+1 < months.length ? months[curIdx+1] : null;
  const curTx = state.transactions.filter(t=>monthKey(t.fecha)===state.currentMonth && t.catTipo==='gasto');
  const prevTx = prevMonth ? state.transactions.filter(t=>monthKey(t.fecha)===prevMonth && t.catTipo==='gasto') : [];
  const curByCat = {}, prevByCat = {};
  curTx.forEach(t=> curByCat[t.catName] = (curByCat[t.catName]||0) + Number(t.monto));
  prevTx.forEach(t=> prevByCat[t.catName] = (prevByCat[t.catName]||0) + Number(t.monto));
  const allCatNames = [...new Set([...Object.keys(curByCat), ...Object.keys(prevByCat)])]
    .sort((a,b) => (curByCat[b]||0) - (curByCat[a]||0));

  // Periodo personalizado (Desde/Hasta) — independiente de los meses
  let customSection = '';
  const customTxAll = (state.customFrom && state.customTo)
    ? state.transactions.filter(t => t.catName && t.fecha >= state.customFrom && t.fecha <= state.customTo)
    : [];
  const customTx = customTxAll.filter(t => t.catTipo === 'gasto'); // lo que sí cuenta en el total
  if(state.customFrom && state.customTo){
    const customTotal = customTx.reduce((s,t)=>s+Number(t.monto),0);
    const customByCat = {}, customByCard = {}, customCatTipo = {};
    customTxAll.forEach(t=>{
      customByCat[t.catName] = (customByCat[t.catName]||0) + Number(t.monto);
      customCatTipo[t.catName] = t.catTipo;
    });
    customTx.forEach(t=>{
      customByCard[t.cardName] = (customByCard[t.cardName]||0) + Number(t.monto);
    });
    const customCatEntries = Object.entries(customByCat).sort((a,b)=>b[1]-a[1]);
    const maxCustomCat = customCatEntries.length ? customCatEntries[0][1] : 1;

    // Desglose por categoría: barra real y legible (no de 4px, no SVG), clickeable.
    // Categorías que no son "gasto" (ahorro/ingreso/no cuenta) se muestran igual,
    // pero atenuadas y marcadas "no suma" — no desaparecen, solo no cuentan en el total.
    const catRows = customCatEntries.map(([name, amt]) => {
      const isSelected = state.customDrilldownCat === name;
      const isGasto = customCatTipo[name] === 'gasto';
      const pct = Math.max((amt / maxCustomCat) * 100, 3);
      const nameAttr = name.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,"\\'");
      const tipoLabel = customCatTipo[name]==='ahorro' ? 'ahorro' : (customCatTipo[name]==='ingreso' ? 'ingreso' : (customCatTipo[name]==='neutral' ? 'no cuenta' : null));
      return `
        <div class="catbar-row${isSelected?' selected':''}" style="${isGasto?'':'opacity:0.55'}" onclick="handleCatBarClick('${nameAttr}')">
          <span class="catbar-name"><span class="cat-dot" style="background:${catColor(name)}"></span>${name}${tipoLabel?` <span class="small-muted" style="font-style:italic">(no suma — ${tipoLabel})</span>`:''}</span>
          <div class="catbar-track"><div class="catbar-fill" style="width:${pct.toFixed(1)}%;background:${catColor(name)}"></div></div>
          <span class="catbar-amt">${fmtMoney(amt)}</span>
        </div>`;
    }).join('');

    // Drill-down: movimientos de la categoría seleccionada, dentro del rango
    let drilldownSection = '';
    if(state.customDrilldownCat){
      const drillTx = customTxAll.filter(t => t.catName === state.customDrilldownCat).sort((a,b)=> b.fecha.localeCompare(a.fecha));
      drilldownSection = `
        <div class="card">
          <div class="flex-between">
            <p class="card-title" style="margin:0">Movimientos — ${state.customDrilldownCat} <span class="small-muted">(${drillTx.length})</span></p>
            <button class="ghost" id="closeDrilldown">Cerrar</button>
          </div>
          <table>
            <thead><tr><th>Fecha</th><th>Descripción</th><th>Tarjeta</th><th style="text-align:right">Monto</th></tr></thead>
            <tbody>
              ${drillTx.map(t=>`
                <tr><td>${t.fecha}</td><td>${t.descripcion}</td><td><span class="card-pill">${t.cardName}</span></td><td class="amt-cell">${fmtMoney(Number(t.monto))}</td></tr>
              `).join('')}
            </tbody>
          </table>
        </div>`;
    }

    customSection = `
      <div class="summary-row" style="margin-top:14px">
        <div class="card stat"><div class="num spend">${fmtMoney(customTotal)}</div><div class="label">Gasto total del periodo</div></div>
        <div class="card stat"><div class="num">${customTx.length}</div><div class="label">Movimientos</div></div>
      </div>
      ${customCatEntries.length ? `
      <div class="card">
        <p class="card-title">Por categoría <span class="small-muted">(clic en una para ver sus movimientos)</span></p>
        ${catRows}
      </div>
      ${drilldownSection}
      <div class="card">
        <p class="card-title">Por tarjeta</p>
        ${Object.entries(customByCard).sort((a,b)=>b[1]-a[1]).map(([name,amt])=>`<div class="cat-line"><span class="card-pill" style="min-width:90px">${name}</span><span class="cat-leader"></span><span class="cat-amt">${fmtMoney(amt)}</span></div>`).join('')}
      </div>` : `<div class="card"><div class="empty-state">Sin gastos categorizados en ese rango.</div></div>`}
    `;
  }

  el.innerHTML = `
    <div class="card">
      <p class="card-title">Periodo personalizado</p>
      <div style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap">
        <div><label>Rango rápido</label>
          <select id="quickRange">
            <option value="">Personalizado</option>
            <option value="this-month">Este mes</option>
            <option value="last-month">Mes pasado</option>
            <option value="this-year">Todo el año</option>
          </select>
        </div>
        <div><label>Desde</label><input type="date" id="customFrom" value="${state.customFrom}"></div>
        <div><label>Hasta</label><input type="date" id="customTo" value="${state.customTo}"></div>
        ${state.customRangeIsManual ? `<button class="ghost" id="clearCustomRange">Volver a "${monthLabel(state.currentMonth)}"</button>` : ''}
      </div>
      ${customSection}
    </div>
    <div class="card">
      <p class="card-title">Gasto mensual — últimos ${monthsAsc.length} meses con datos</p>
      <svg viewBox="0 0 ${chartW} ${chartH}" style="width:100%;height:auto;display:block">
        ${bars}
      </svg>
    </div>
    <div class="card">
      <p class="card-title">${monthLabel(state.currentMonth)} vs ${prevMonth ? monthLabel(prevMonth) : 'mes anterior (sin datos)'}, por categoría</p>
      ${allCatNames.length === 0 ? `<div class="empty-state">Sin datos suficientes todavía.</div>` : `
      <table>
        <thead><tr><th>Categoría</th><th style="text-align:right">${monthLabel(state.currentMonth)}</th><th style="text-align:right">${prevMonth ? monthLabel(prevMonth) : '—'}</th><th style="text-align:right">Cambio</th></tr></thead>
        <tbody>
          ${allCatNames.map(name=>{
            const cur = curByCat[name] || 0;
            const prev = prevByCat[name] || 0;
            const delta = prev > 0 ? ((cur-prev)/prev*100) : (cur > 0 ? 100 : 0);
            const deltaColor = delta > 0 ? 'var(--alert)' : (delta < 0 ? 'var(--accent)' : 'var(--muted)');
            const arrow = delta > 0.5 ? '▲' : (delta < -0.5 ? '▼' : '·');
            return `
            <tr>
              <td><span class="cat-dot" style="background:${catColor(name)};display:inline-block;margin-right:6px"></span>${name}</td>
              <td class="amt-cell">${fmtMoney(cur)}</td>
              <td class="amt-cell" style="color:var(--muted)">${fmtMoney(prev)}</td>
              <td class="amt-cell" style="color:${deltaColor}">${arrow} ${Math.abs(delta).toFixed(0)}%</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`}
    </div>`;

  document.getElementById('customFrom').addEventListener('change', (e)=>{ state.customFrom = e.target.value; state.customRangeIsManual = true; state.customDrilldownCat=null; renderAnalysis(); });
  document.getElementById('customTo').addEventListener('change', (e)=>{ state.customTo = e.target.value; state.customRangeIsManual = true; state.customDrilldownCat=null; renderAnalysis(); });
  document.getElementById('quickRange').addEventListener('change', (e)=>{
    const preset = e.target.value;
    if(!preset) return;
    const pad = n => String(n).padStart(2,'0');
    const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth();
    if(preset === 'this-month'){
      state.customFrom = fmt(new Date(y, m, 1));
      state.customTo = fmt(new Date(y, m+1, 0));
    } else if(preset === 'last-month'){
      state.customFrom = fmt(new Date(y, m-1, 1));
      state.customTo = fmt(new Date(y, m, 0));
    } else if(preset === 'this-year'){
      state.customFrom = fmt(new Date(y, 0, 1));
      state.customTo = fmt(new Date(y, 11, 31));
    }
    state.customRangeIsManual = true;
    state.customDrilldownCat = null;
    renderAnalysis();
  });
  const clearBtn = document.getElementById('clearCustomRange');
  if(clearBtn) clearBtn.addEventListener('click', ()=>{ state.customRangeIsManual = false; state.customDrilldownCat=null; renderAll(); });
  const closeDrill = document.getElementById('closeDrilldown');
  if(closeDrill) closeDrill.addEventListener('click', ()=>{ state.customDrilldownCat = null; renderAnalysis(); });
}

// Global porque se llama desde un atributo onclick inline en el SVG (más confiable
// que depender de addEventListener después de inyectar innerHTML)
function handleCatBarClick(catName){
  state.customDrilldownCat = (state.customDrilldownCat === catName) ? null : catName;
  renderAnalysis();
}

/* ---------- View switching ---------- */
function renderAll(){
  renderMonthStrip();
  document.getElementById('viewDashboard').style.display = state.currentView==='dashboard' ? '' : 'none';
  document.getElementById('viewAnalisis').style.display = state.currentView==='analisis' ? '' : 'none';
  document.getElementById('viewTransactions').style.display = state.currentView==='transactions' ? '' : 'none';
  document.getElementById('viewImport').style.display = state.currentView==='import' ? '' : 'none';
  document.getElementById('viewSettings').style.display = state.currentView==='settings' ? '' : 'none';
  if(state.currentView==='dashboard') renderDashboard();
  if(state.currentView==='analisis') renderAnalysis();
  if(state.currentView==='transactions') renderTransactions();
  if(state.currentView==='import') renderImport();
  if(state.currentView==='settings') renderSettings();
  document.querySelectorAll('.tabbar button').forEach(b=> b.classList.toggle('active', b.dataset.view===state.currentView));
}
document.querySelectorAll('.tabbar button').forEach(btn=>{
  btn.addEventListener('click', ()=>{ state.currentView = btn.dataset.view; renderAll(); });
});

initAuth();
</script>
</body>
</html>
